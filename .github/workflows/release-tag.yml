name: Release (Tag)

# Builds a signed release APK + AAB and publishes a GitHub Release
# whenever a version tag is pushed (e.g. v1.0.0).
# Skips automatically if the tag ends with -debug (those go to debug-tag.yml).
#
# ── How to trigger ────────────────────────────────────────────────────────────
#   git tag v1.0.0
#   git push origin v1.0.0
#
# ── Required secrets ──────────────────────────────────────────────────────────
#   RELEASE_KEYSTORE_BASE64   base64-encoded .jks keystore file
#   RELEASE_STORE_PASSWORD    keystore store password
#   RELEASE_KEY_ALIAS         key alias inside the keystore
#   RELEASE_KEY_PASSWORD      key password
#   SLACK_WEBHOOK_URL         Slack incoming webhook URL (optional)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.ref_name, '-debug') }}

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        working-directory: android-native
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "local.properties written: $(cat local.properties)"

      - name: Decode release keystore
        working-directory: android-native/app
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "Keystore size: $(du -sh release.keystore)"

      - name: Build release APK
        working-directory: android-native
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Build release AAB
        working-directory: android-native
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: |
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Rename build outputs
        run: |
          cp android-native/app/build/outputs/apk/release/app-release.apk \
             focusflow-${{ github.ref_name }}.apk
          cp android-native/app/build/outputs/bundle/release/app-release.aab \
             focusflow-${{ github.ref_name }}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FocusFlow ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            focusflow-${{ github.ref_name }}.apk
            focusflow-${{ github.ref_name }}.aab

      - name: Remove keystore from runner
        if: always()
        working-directory: android-native/app
        run: rm -f release.keystore

      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"good\",\"text\":\":rocket: *FocusFlow ${{ github.ref_name }}* released! APK + AAB on GitHub Releases.\",\"mrkdwn_in\":[\"text\"]}]}"
