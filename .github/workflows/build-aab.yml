name: Build AAB

on:
  workflow_dispatch:

env:
  NPM_CONFIG_NODE_LINKER: hoisted
  EXPO_ROUTER_APP_ROOT: app

jobs:
  aab:
    name: Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo Prebuild
        working-directory: artifacts/focusflow
        run: npx expo prebuild --platform android --clean --no-install

      - name: Inject ProGuard rules
        working-directory: artifacts/focusflow
        run: cp proguard-rules.pro android/app/proguard-rules.pro

      - name: Disable ABI splits for AAB
        working-directory: artifacts/focusflow
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const file = 'android/app/build.gradle';
          const source = fs.readFileSync(file, 'utf8');
          const updated = source.replace(
            /(splits\s*\{\s*abi\s*\{\s*)enable true([\s\S]*?universalApk )true/,
            '$1enable false$2false'
          );
          if (updated === source) {
            throw new Error('ABI splits block was not patched');
          }
          fs.writeFileSync(file, updated);
          NODE

      - name: Enable R8 full mode
        working-directory: artifacts/focusflow/android
        run: |
          echo "" >> gradle.properties
          echo "android.enableR8.fullMode=true" >> gradle.properties

      - name: Decode release keystore
        working-directory: artifacts/focusflow/android
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build release AAB
        working-directory: artifacts/focusflow/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"

          echo "AAB output"
          find app/build/outputs/bundle/release/ -name "*.aab" -exec ls -lh {} \;

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-aab-${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Remove keystore from runner
        if: always()
        working-directory: artifacts/focusflow/android
        run: rm -f release.keystore