name: Build Kotlin App

# Builds debug APK on every push/PR touching android-native/.
# Also builds a signed release APK when triggered manually (workflow_dispatch).
#
# ── Secrets needed for release build (workflow_dispatch only) ─────────────────
#   RELEASE_KEYSTORE_BASE64   base64-encoded .jks keystore file
#   RELEASE_STORE_PASSWORD    keystore store password
#   RELEASE_KEY_ALIAS         key alias inside the keystore
#   RELEASE_KEY_PASSWORD      key password
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'android-native/**'
      - '.github/workflows/build-kotlin.yml'
  pull_request:
    paths:
      - 'android-native/**'
  workflow_dispatch:

jobs:
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Create local.properties
        working-directory: android-native
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "local.properties written: $(cat local.properties)"

      - name: Build debug APK
        working-directory: android-native
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-kotlin-debug-${{ github.run_number }}
          path: android-native/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-release:
    name: Release APK
    runs-on: ubuntu-latest
    needs: build-debug
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        working-directory: android-native
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Decode keystore
        working-directory: android-native
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build release APK
        working-directory: android-native
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-kotlin-release-${{ github.run_number }}
          path: android-native/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Remove keystore from runner
        if: always()
        working-directory: android-native/app
        run: rm -f release.keystore
