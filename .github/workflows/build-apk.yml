name: Build Android APK

# ─────────────────────────────────────────────────────────────────────────────
# Builds FocusFlow without EAS or any Expo cloud service.
# Pipeline: pnpm install → expo prebuild → Gradle assembleDebug/Release
#
# Triggers:
#   • Every push to main       → debug APK (no secrets needed, always works)
#   • Manual workflow_dispatch → choose debug or release
#
# ── To enable RELEASE builds ─────────────────────────────────────────────────
# Add these 4 secrets in:
#   GitHub repo → Settings → Secrets and variables → Actions → New secret
#
#   RELEASE_KEYSTORE_BASE64   base64-encoded .jks keystore file
#   RELEASE_STORE_PASSWORD    keystore store password
#   RELEASE_KEY_ALIAS         key alias inside the keystore
#   RELEASE_KEY_PASSWORD      key password
#
# Generate a keystore once (run locally, keep the file safe — losing it means
# you can never update the app on Play Store with the same signing):
#   keytool -genkeypair -v -keystore release.keystore \
#     -alias focusflow -keyalg RSA -keysize 2048 -validity 10000
#
# Encode it for the secret:
#   Linux:  base64 -w0 release.keystore
#   macOS:  base64 release.keystore | pbcopy   (copies to clipboard)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  # pnpm must use hoisted layout so Gradle can find node_modules without
  # following symlinks (which it cannot do on all host configurations).
  NPM_CONFIG_NODE_LINKER: hoisted
  # Tells Expo Router where the app/ directory lives.
  EXPO_ROUTER_APP_ROOT: app

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ─────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── 3. Caches ────────────────────────────────────────────────────────────
      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 4. Install JS dependencies ───────────────────────────────────────────
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Expo Prebuild ─────────────────────────────────────────────────────
      # Generates the android/ directory from the Expo managed config.
      # The withFocusDayAndroid.js config plugin runs automatically here and:
      #   • Copies all Kotlin source files from android-native/ into android/
      #   • Injects all permissions and component declarations into AndroidManifest.xml
      #   • Registers FocusDayPackage in MainApplication.kt
      #   • Patches settings.gradle for pnpm monorepo compatibility
      # No manual file editing or install.sh is needed — the plugin handles it all.
      #
      # --clean      always regenerates android/ from scratch (no stale state)
      # --no-install skips a redundant npm install (step 4 already did this)
      - name: Expo Prebuild
        working-directory: artifacts/focusflow
        run: npx expo prebuild --platform android --clean --no-install

      # ── 6. Debug build (default on every push) ───────────────────────────────
      - name: Build debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: artifacts/focusflow/android
        run: ./gradlew assembleDebug --no-daemon

      # ── 7. Release build (manual trigger only, requires secrets) ─────────────
      # Signing is passed directly to Gradle via the official
      # -Pandroid.injected.signing.* mechanism — no build.gradle edits needed.
      - name: Decode release keystore
        if: ${{ github.event.inputs.build_type == 'release' && secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        working-directory: artifacts/focusflow/android
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "Keystore size: $(du -sh release.keystore)"

      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' && secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        working-directory: artifacts/focusflow/android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"

      # ── 8. Upload APK ─────────────────────────────────────────────────────────
      - name: Upload debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-debug-${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type == 'release' && secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-release-${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
